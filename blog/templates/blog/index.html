{% extends 'blog/basic.html' %}

{% block body %}
<div class="container mt-3">

  <div class="row my-2">
    {% for item in allblog %}
    <div class="col-md-6">
      <div class="row g-0 border rounded overflow-hidden flex-md-row mb-4 shadow-sm h-md-250 position-relative">
        <div class="col p-4 d-flex flex-column position-static">{{item.head0}}<strong
            class="d-inline-block mb-2 text-primary-emphasis"></strong>
          <h3 class="mb-0">{{item.title}}</h3>
          <div class="mb-1 text-body-secondary">Nov 12</div>
          <p class="card-text mb-auto">{{ item.head1|truncatewords:2 }}</p> <a href="blogPost/{{item.post_id}}"
            class="icon-link gap-1 icon-link-hover stretched-link">
            Continue reading
          </a>
        </div>
        <div class="col-auto d-none d-lg-block">
          {% if item.image %}
          <img src="{{ item.image.url }}" height="250" width="200" style="object-fit: cover;" class="img-fluid rounded">
          {% endif %}
        </div>
      </div>
    </div>
    {% if forloop.counter|divisibleby:2 or forloop.last %}
  </div>
  <div class="row my-2">
    {% endif %}
    {% endfor %}

  </div>
  {% endblock %}
